services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ter-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_URL: http://localhost:8000
      DB_HOST: host.docker.internal
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
